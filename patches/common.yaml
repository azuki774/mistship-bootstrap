machine:
  network:
    kubespan:
      enabled: true
      allowDownPeerBypass: false
      advertiseKubernetesNetworks: false
      filters:
        endpoints:
          - 0.0.0.0/0
          - '!100.64.0.0/10' # tailscale ranges
          - ::/0
          - '!fd7a:115c:a1e0::/48'
  install:
    disk: /dev/sda
    image: factory.talos.dev/installer/708747e350d604ae9e57227d8dcf274091453ddb1097b765d4ea8884f1992c1f:v1.12.6
    wipe: false
    grubUseUKICmdline: true
  features:
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
cluster:
  clusterName: mistship
  network:
    dnsDomain: cluster.local
    cni:
      name: none
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  proxy:
    disabled: true

name: Nix CI

on:
  pull_request:
    paths:
      - "flake.nix"
      - "**/*.nix"
      - "flake.lock"
      - "scripts/ci-nix-checks.sh"
      - ".github/workflows/nix-ci.yml"
  push:
    branches:
      - master
    paths:
      - "flake.nix"
      - "**/*.nix"
      - "flake.lock"
      - "scripts/ci-nix-checks.sh"
      - ".github/workflows/nix-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run CI checks in dev shell
        run: nix develop .#default --command bash ./scripts/ci-nix-checks.sh

name: Talos Preflight

on:
  pull_request:
    paths:
      - "flake.nix"
      - "**/*.nix"
      - "flake.lock"
      - "patches/**"
      - ".sops.yaml"
      - "secrets/**"
      - "manifests/**"
      - "scripts/ops/apply-bootstrap-manifests.sh"
      - "scripts/ci/talos-preflight.sh"
      - "scripts/ops/decrypt-cluster-secrets.sh"
      - "scripts/ops/prepare-cluster-access.sh"
      - "scripts/ops/validate-manifests.sh"
      - ".github/workflows/talos-preflight.yml"
  push:
    branches:
      - master
    paths:
      - "flake.nix"
      - "**/*.nix"
      - "flake.lock"
      - "patches/**"
      - ".sops.yaml"
      - "secrets/**"
      - "manifests/**"
      - "scripts/ops/apply-bootstrap-manifests.sh"
      - "scripts/ci/talos-preflight.sh"
      - "scripts/ops/decrypt-cluster-secrets.sh"
      - "scripts/ops/prepare-cluster-access.sh"
      - "scripts/ops/validate-manifests.sh"
      - ".github/workflows/talos-preflight.yml"

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run Talos preflight checks in dev shell
        # PR-safe validation only. This job never decrypts real cluster secrets.
        run: nix develop .#default --command bash ./scripts/ci/talos-preflight.sh

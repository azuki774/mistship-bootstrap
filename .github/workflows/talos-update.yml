name: Talos Update

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "patches/common.yaml"
      - "patches/controlplane.yaml"
      - "image.yml"
      - "manifests/infra/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/actions/cluster-access/**"
      - ".github/workflows/talos-update.yml"

concurrency:
  group: talos-update-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  id-token: write

jobs:
  update-control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Development
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SECERT_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_BUCKET_ACEESS_KEY }}
          aws-region: ap-northeast-1
          mask-aws-account-id: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v15

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Prepare cluster access
        uses: ./.github/actions/cluster-access
        with:
          secret-bucket-name: ${{ secrets.SECRET_BUCKET_NAME }}
          aws-region: ap-northeast-1

      - name: Apply control plane config
        run: |
          set -euo pipefail
          nix develop .#default --command bash -lc '
            set -euo pipefail
            talosctl apply-config \
              --talosconfig "$TALOSCONFIG" \
              --endpoints "$CONTROL_PLANE_IP" \
              --nodes "$CONTROL_PLANE_IP" \
              --file "$CONTROL_PLANE_CONFIG"
          '

      - name: Verify Talos API recovery
        run: |
          set -euo pipefail
          nix develop .#default --command bash -lc '
            set -euo pipefail

            for attempt in $(seq 1 20); do
              if talosctl version \
                --talosconfig "$TALOSCONFIG" \
                --endpoints "$CONTROL_PLANE_IP" \
                --nodes "$CONTROL_PLANE_IP"
              then
                exit 0
              fi

              sleep 15
            done

            echo "Talos API did not recover after apply-config" >&2
            exit 1
          '

      - name: Generate kubeconfig
        run: |
          set -euo pipefail
          nix develop .#default --command bash -lc '
            set -euo pipefail
            talosctl kubeconfig "$KUBECONFIG" \
              --merge=false \
              --force \
              --talosconfig "$TALOSCONFIG" \
              --endpoints "$CONTROL_PLANE_IP" \
              --nodes "$CONTROL_PLANE_IP"
            chmod 600 "$KUBECONFIG"
          '

      - name: Apply infrastructure manifests
        run: |
          set -euo pipefail

          if ! find manifests/infra -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.json' \) -print -quit | grep -q .; then
            echo "No infrastructure manifests found under manifests/infra; skipping apply."
            exit 0
          fi

          nix develop .#default --command kubectl apply --recursive -f manifests/infra

      - name: Clean up secrets
        if: always()
        run: |
          rm -rf .secret

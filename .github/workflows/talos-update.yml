name: Talos Update

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "patches/common.yaml"
      - "patches/controlplane.yaml"
      - "image.yml"
      - "manifests/infra/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/actions/cluster-access/**"
      - ".github/workflows/talos-update.yml"

concurrency:
  group: talos-update-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  id-token: write

jobs:
  update-control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: Development
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SECERT_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_BUCKET_ACEESS_KEY }}
          aws-region: ap-northeast-1
          mask-aws-account-id: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Prepare cluster access
        uses: ./.github/actions/cluster-access
        with:
          secret-bucket-name: ${{ secrets.SECRET_BUCKET_NAME }}
          aws-region: ap-northeast-1

      - name: Run Talos update
        run: nix develop .#default --command bash ./scripts/run-talos-update.sh

      - name: Clean up secrets
        if: always()
        run: |
          rm -rf .secret

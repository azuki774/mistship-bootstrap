name: Cluster Access
description: Prepare Talos client artifacts and optionally fetch kubeconfig for CI jobs.

inputs:
  secret-bucket-name:
    description: S3 bucket name that stores cluster input files.
    required: true
  aws-region:
    description: AWS region for the secret bucket.
    required: false
    default: ap-northeast-1
  generate-kubeconfig:
    description: Whether to fetch kubeconfig after preparing Talos access.
    required: false
    default: "false"

outputs:
  cluster-name:
    description: Cluster name loaded from the secret env file.
    value: ${{ steps.publish.outputs.cluster_name }}
  control-plane-ip:
    description: Control plane IP loaded from the secret env file.
    value: ${{ steps.publish.outputs.control_plane_ip }}
  talosconfig:
    description: Path to the generated talosconfig.
    value: ${{ steps.publish.outputs.talosconfig }}
  kubeconfig:
    description: Path to the generated kubeconfig.
    value: ${{ steps.publish.outputs.kubeconfig }}

runs:
  using: composite
  steps:
    - name: Prepare secret workspace
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p .secret/generated .secret/nodes

    - name: Download cluster inputs
      shell: bash
      env:
        SECRET_BUCKET_NAME: ${{ inputs.secret-bucket-name }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        set -euo pipefail
        set +x
        aws s3 cp --only-show-errors "s3://$SECRET_BUCKET_NAME/mistship/.env" .secret/.env --region "$AWS_REGION"
        aws s3 cp --only-show-errors "s3://$SECRET_BUCKET_NAME/mistship/cluster-secrets.yaml" .secret/cluster-secrets.yaml --region "$AWS_REGION"
        chmod 600 .secret/.env .secret/cluster-secrets.yaml

    - name: Load cluster settings
      id: settings
      shell: bash
      run: |
        set -euo pipefail
        set +x

        read_env() {
          local key="$1"
          local value

          value="$(grep -m1 "^${key}=" .secret/.env | cut -d= -f2- || true)"
          if [[ -z "$value" ]]; then
            return 1
          fi

          value="${value%\"}"
          value="${value#\"}"
          value="${value%\'}"
          value="${value#\'}"
          printf "%s\n" "$value"
        }

        CLUSTER_NAME="$(read_env CLUSTER_NAME)"
        CONTROL_PLANE_IP="$(read_env CONTROL_PLANE_IP)"
        INSTALL_DISK="$(read_env INSTALL_DISK)"
        INSTALL_IMAGE="$(read_env INSTALL_IMAGE || true)"

        if [[ -z "$INSTALL_IMAGE" || "$INSTALL_IMAGE" == *'$'* ]]; then
          TALOS_VERSION="$(read_env TALOS_VERSION)"
          SCHEMATIC_ID="$(read_env SCHEMATIC_ID)"
          INSTALL_IMAGE="factory.talos.dev/installer/$SCHEMATIC_ID:$TALOS_VERSION"
        fi

        {
          echo "MISTSHIP_SECRETS_DIR=$GITHUB_WORKSPACE/.secret"
          echo "CLUSTER_SECRETS=$GITHUB_WORKSPACE/.secret/cluster-secrets.yaml"
          echo "TALOSCONFIG=$GITHUB_WORKSPACE/.secret/talosconfig"
          echo "KUBECONFIG=$GITHUB_WORKSPACE/.secret/kubeconfig"
          echo "GENERATED_CONFIG_DIR=$GITHUB_WORKSPACE/.secret/generated"
          echo "CONTROL_PLANE_CONFIG=$GITHUB_WORKSPACE/.secret/nodes/controlplane.yaml"
          echo "WORKER_CONFIG=$GITHUB_WORKSPACE/.secret/nodes/worker.yaml"
          echo "CLUSTER_NAME=$CLUSTER_NAME"
          echo "CONTROL_PLANE_IP=$CONTROL_PLANE_IP"
          echo "INSTALL_DISK=$INSTALL_DISK"
          echo "INSTALL_IMAGE=$INSTALL_IMAGE"
        } >> "$GITHUB_ENV"

        {
          echo "cluster-name=$CLUSTER_NAME"
          echo "control-plane-ip=$CONTROL_PLANE_IP"
        } >> "$GITHUB_OUTPUT"

    - name: Generate Talos artifacts
      shell: bash
      run: |
        set -euo pipefail
        nix develop .#default --command bash -lc '
          set -euo pipefail
          talosctl gen config "$CLUSTER_NAME" "https://$CONTROL_PLANE_IP:6443" \
            --with-secrets "$CLUSTER_SECRETS" \
            --install-disk "$INSTALL_DISK" \
            --install-image "$INSTALL_IMAGE" \
            --config-patch "@patches/common.yaml" \
            --config-patch-control-plane "@patches/controlplane.yaml" \
            --output "$GENERATED_CONFIG_DIR"

          cp "$GENERATED_CONFIG_DIR/controlplane.yaml" "$CONTROL_PLANE_CONFIG"
          cp "$GENERATED_CONFIG_DIR/worker.yaml" "$WORKER_CONFIG"
          cp "$GENERATED_CONFIG_DIR/talosconfig" "$TALOSCONFIG"
          chmod 600 "$CONTROL_PLANE_CONFIG" "$WORKER_CONFIG" "$TALOSCONFIG"
        '

    - name: Generate kubeconfig
      if: ${{ inputs.generate-kubeconfig == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        nix develop .#default --command bash -lc '
          set -euo pipefail
          talosctl kubeconfig "$KUBECONFIG" \
            --merge=false \
            --force \
            --talosconfig "$TALOSCONFIG" \
            --endpoints "$CONTROL_PLANE_IP" \
            --nodes "$CONTROL_PLANE_IP"
          chmod 600 "$KUBECONFIG"
        '

    - name: Publish outputs
      id: publish
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "cluster_name=$CLUSTER_NAME"
          echo "control_plane_ip=$CONTROL_PLANE_IP"
          echo "talosconfig=$TALOSCONFIG"
          echo "kubeconfig=$KUBECONFIG"
        } >> "$GITHUB_OUTPUT"
